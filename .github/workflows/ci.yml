# Runs the deterministic checks on every push/PR so the invariants in CLAUDE.md
# that ARE machine-checked (strict typecheck + the test suite) can't silently rot.
# (Activates once this repo has a GitHub remote.)
name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run check   # typecheck (strict TS) + vitest
      - run: npm run build   # the bundle must build
