# Live e2e checks: the ones CI's `check` job can't run, because they need a real browser
# hitting the live Showdown site (drift-check, client-shape drift) and a real battle for
# the myPokemon-only reads (player-check — switch menu, own-hover matchup, ⚡ verdict, Tera
# checkbox). See CLAUDE.md → "Client field names are reverse-engineered" for why these
# exist at all.
#
# player-check battles against a throwaway, self-hosted Showdown server it starts itself
# (scripts/lib/local-server.mjs) rather than real play.pokemonshowdown.com accounts — no
# credentials needed here at all.
#
# Manual trigger only (workflow_dispatch), not on every push/PR: this is heavier and slower
# than the fast typecheck+test gate (a real browser, plus cloning/building the local server
# on a cold cache), and a flaky live-site run shouldn't block unrelated work. Run this by
# hand before tagging a release — `gh workflow run e2e.yml`.
name: E2E

on:
  workflow_dispatch:
    inputs:
      format:
        description: 'Format id to probe (drift-check + player-check)'
        required: false
        default: 'gen9randombattle'

jobs:
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: node scripts/drift-check.mjs "${{ inputs.format }}"
      - run: node scripts/player-check.mjs "${{ inputs.format }}"
